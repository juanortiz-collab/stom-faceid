<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>STOM FaceID</title>

<style>
body{
font-family:Arial;
background:#0b1220;
color:white;
text-align:center;
padding:20px;
}

video{
width:100%;
max-width:500px;
border-radius:10px;
}

button{
padding:12px;
margin-top:10px;
width:100%;
max-width:500px;
background:#1f8efb;
color:white;
border:none;
border-radius:10px;
font-size:18px;
}

#status{
margin-top:10px;
font-size:14px;
}
</style>

</head>

<body>

<h2>STOM FaceID</h2>

<video id="video" autoplay playsinline></video>

<button onclick="startCamera()">
Activar Cámara
</button>

<button onclick="capture()">
Capturar
</button>

<div id="status">
Esperando...
</div>


<script>

const API =
"https://script.google.com/macros/s/AKfycbxSetPE6rp4iQg6mTD-1siKDonRDz9rDewnvnTBRdkImP6zMWJtzaSMjLDQ5L9hORM0/exec";

let stream;

async function startCamera(){

document.getElementById("status").innerHTML="Activando cámara...";

stream = await navigator.mediaDevices.getUserMedia({
video:true
});

video.srcObject=stream;

document.getElementById("status").innerHTML="Cámara OK";

}


async function capture(){

document.getElementById("status").innerHTML="Capturando...";

let canvas=document.createElement("canvas");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

canvas.getContext("2d")
.drawImage(video,0,0);

let img=canvas.toDataURL("image/jpeg");

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"submit",
data:{
token:"test",
imageDataUrl:img
}
})
})
.then(r=>r.json())
.then(d=>{

document.getElementById("status").innerHTML=
JSON.stringify(d);

});

}

</script>

</body>
</html>
